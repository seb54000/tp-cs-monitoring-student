# networks
# create a network 'monitoring_net_compose' in mode 'bridged'
# networks:
#   monitoring_net_compose:
#     driver: bridge

volumes:
  prometheus-data:
  grafana-data:

# services
services:
  # grafana
  grafana:
    depends_on:
    - prometheus
    container_name: grafana
    environment:
      - GF_SECURITY_ADMIN_USER=grafana
      - GF_SECURITY_ADMIN_PASSWORD=grafana
    image: grafana/grafana
    network_mode: host
    volumes:
      - grafana-data:/var/lib/grafana
      - /home/vm00/tp-cs-monitoring-student/grafana-provisioning:/etc/grafana/provisioning
      - /home/vm00/tp-cs-monitoring-student/grafana/dashboards:/var/lib/grafana/dashboards
    restart: always
    # ports:
    # - 3000:3000/tcp

  # prometheus
  prometheus:
    container_name: prometheus
    image: prom/prometheus
    network_mode: host
    volumes:
      - /home/vm00/tp-cs-monitoring-student/prometheus.yml:/etc/prometheus/prometheus.yml:rw
      - prometheus-data:/prometheus
    # ports:
    # - 9090:9090/tcp
    restart: always


