# networks
# create a network 'monitoring_net_compose' in mode 'bridged'
networks:
  monitoring_net_compose:
    driver: bridge

volumes:
  prometheus-data:
  grafana-data:

# services
services:
  # grafana
  grafana:
    depends_on:
    - prometheus
    container_name: grafana
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    image: grafana/grafana
    networks:
      - monitoring_net_compose
    volumes:
      - grafana-data:/var/lib/grafana
      - /var/tmp/tp-cs-monitoring-student/grafana-provisioning:/etc/grafana/provisioning
      - /var/tmp/tp-cs-monitoring-student/grafana/dashboards:/var/lib/grafana/dashboards
    restart: always
    ports:
    - 3000:3000/tcp

  # prometheus
  prometheus:
    container_name: prometheus
    image: prom/prometheus
    networks:
      - monitoring_net_compose
    volumes:
      - /var/tmp/tp-cs-monitoring-student/prometheus.yml:/etc/prometheus/prometheus.yml:rw
      - prometheus-data:/prometheus
    ports:
    - 9090:9090/tcp
    restart: always


