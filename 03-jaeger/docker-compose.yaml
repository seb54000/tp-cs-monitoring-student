
volumes:
  prometheus-data:
  grafana-data:

services:
  api:
    network_mode: host
    build: .
    # ports:
    #   - "5000:5000"
    #   - "8000:8000"
    environment:
      - OTEL_RESOURCE_ATTRIBUTES=service.name=slow-api
      - OTEL_EXPORTER_JAEGER_AGENT_HOST=jaeger
      - OTEL_EXPORTER_JAEGER_AGENT_PORT=6831
      - OTEL_METRICS_EXPORTER=prometheus

  prometheus:
    image: prom/prometheus
    network_mode: host
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    # ports:
    #   - "9090:9090"

  grafana:
    image: grafana/grafana
    network_mode: host
    # ports:
    #   - "3000:3000"
    depends_on:
      - prometheus
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=grafana
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana-provisioning:/etc/grafana/provisioning

  jaeger:
    image: jaegertracing/all-in-one:latest
    network_mode: host
    # ports:
    #   - "16686:16686" # UI Web
    #   # - "6831:6831/udp"
    #   - "4317:4317"    # OTLP (nouveau protocole)