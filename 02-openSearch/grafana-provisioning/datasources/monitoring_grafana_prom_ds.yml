# config file version
apiVersion: 1
# list of datasources that should be deleted from the database (if already existing)
deleteDatasources:
  - name: Prometheus
    orgId: 1
datasources:
- name: Prometheus
  type: prometheus
  access: proxy
  orgId: 1
  url: http://localhost:9090
  isDefault: true
  version: 1
  editable: true

- name: OpenSearch
  type: grafana-opensearch-datasource
  access: proxy
  url: https://localhost:9200
  basicAuth: true
  basicAuthUser: admin
  secureJsonData:
    basicAuthPassword: admin
  jsonData:
    timeField: "@timestamp"
    flavor: "opensearch"
    version: "2.5.0"
    tlsSkipVerify: true

