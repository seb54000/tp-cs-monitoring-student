apiVersion: 1

datasources:
  - name: Prometheus
    uid: prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true

  - name: Jaeger
    uid: jaeger
    type: jaeger
    access: proxy
    url: http://jaeger:16686

  - name: OpenSearch
    uid: opensearch
    type: grafana-opensearch-datasource
    access: proxy
    url: https://opensearch:9200
    basicAuth: true
    basicAuthUser: admin
    secureJsonData:
      basicAuthPassword: "Str0ng!DemoBoard#2026"
    jsonData:
      flavor: opensearch
      version: "2.18.0"
      timeField: "@timestamp"
      logMessageField: message
      logLevelField: level
      tlsSkipVerify: true
      database: "demoboard-logs-*"
