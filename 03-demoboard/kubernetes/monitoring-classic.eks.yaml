---
apiVersion: v1
kind: Namespace
metadata:
  name: vm00
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: otel-collector
  namespace: vm00
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: fluent-bit
  namespace: vm00
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: vm00-monitoring-metadata-reader
rules:
  - apiGroups: [""]
    resources: ["pods", "namespaces", "nodes"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["replicasets"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: vm00-otel-collector-metadata-reader
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: vm00-monitoring-metadata-reader
subjects:
  - kind: ServiceAccount
    name: otel-collector
    namespace: vm00
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: vm00-fluent-bit-metadata-reader
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: vm00-monitoring-metadata-reader
subjects:
  - kind: ServiceAccount
    name: fluent-bit
    namespace: vm00
---
apiVersion: v1
kind: Secret
metadata:
  name: monitoring-secrets
  namespace: vm00
type: Opaque
stringData:
  GRAFANA_ADMIN_PASSWORD: grafana
  OPENSEARCH_INITIAL_ADMIN_PASSWORD: Str0ng!DemoBoard#2026
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: otel-collector-config
  namespace: vm00
data:
  config.yaml: |
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318
    processors:
      k8sattributes:
        auth_type: serviceAccount
        extract:
          metadata:
            - k8s.namespace.name
            - k8s.pod.name
            - k8s.pod.uid
            - k8s.node.name
            - k8s.deployment.name
            - k8s.container.name
      batch:
    exporters:
      prometheus:
        endpoint: 0.0.0.0:9464
      otlp/jaeger:
        endpoint: jaeger.vm00.svc.cluster.local:4317
        tls:
          insecure: true
      debug:
        verbosity: basic
    service:
      pipelines:
        traces:
          receivers: [otlp]
          processors: [k8sattributes, batch]
          exporters: [otlp/jaeger, debug]
        metrics:
          receivers: [otlp]
          processors: [k8sattributes, batch]
          exporters: [prometheus, debug]
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: vm00
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s

    scrape_configs:
      - job_name: prometheus
        static_configs:
          - targets: ["localhost:9090"]

      - job_name: otel-collector
        static_configs:
          - targets: ["otel-collector.vm00.svc.cluster.local:9464"]

      - job_name: postgres-exporter
        static_configs:
          - targets: ["postgres-exporter.vm00.svc.cluster.local:9187"]

      - job_name: redis-exporter
        static_configs:
          - targets: ["redis-exporter.vm00.svc.cluster.local:9121"]
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: vm00
data:
  datasources.yml: |
    apiVersion: 1

    datasources:
      - name: Prometheus
        uid: prometheus
        type: prometheus
        access: proxy
        url: http://prometheus.vm00.svc.cluster.local:9090
        isDefault: true

      - name: Jaeger
        uid: jaeger
        type: jaeger
        access: proxy
        url: http://jaeger.vm00.svc.cluster.local:16686

      - name: OpenSearch
        uid: opensearch
        type: grafana-opensearch-datasource
        access: proxy
        url: https://opensearch.vm00.svc.cluster.local:9200
        basicAuth: true
        basicAuthUser: admin
        secureJsonData:
          basicAuthPassword: "Str0ng!DemoBoard#2026"
        jsonData:
          flavor: opensearch
          version: "2.18.0"
          timeField: "@timestamp"
          logMessageField: log
          logLevelField: stream
          tlsSkipVerify: true
          database: "demoboard-logs-*"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: fluent-bit-config
  namespace: vm00
data:
  fluent-bit.conf: |
    [SERVICE]
        Flush         1
        Daemon        Off
        Log_Level     info
        Parsers_File  /fluent-bit/etc/parsers.conf

    [INPUT]
        Name              tail
        Path              /var/log/containers/*_demoboard_*.log
        Parser            cri
        Tag               kube.*
        Refresh_Interval  5
        Mem_Buf_Limit     10MB
        Skip_Long_Lines   On

    [FILTER]
        Name                kubernetes
        Match               kube.*
        Kube_URL            https://kubernetes.default.svc:443
        Kube_CA_File        /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
        Kube_Token_File     /var/run/secrets/kubernetes.io/serviceaccount/token
        Kube_Tag_Prefix     kube.var.log.containers.
        Merge_Log           On
        Merge_Log_Key       log_processed
        Keep_Log            On
        Labels              On
        Annotations         On

    [OUTPUT]
        Name                opensearch
        Match               kube.*
        Host                opensearch.vm00.svc.cluster.local
        Port                9200
        HTTP_User           admin
        HTTP_Passwd         Str0ng!DemoBoard#2026
        Index               demoboard-logs
        Logstash_Format     On
        Logstash_Prefix     demoboard-logs
        Suppress_Type_Name  On
        tls                 On
        tls.verify          Off

  parsers.conf: |
    [PARSER]
        Name        cri
        Format      regex
        Regex       ^(?<time>[^ ]+) (?<stream>stdout|stderr) (?<logtag>[^ ]*) (?<log>.*)$
        Time_Key    time
        Time_Format %Y-%m-%dT%H:%M:%S.%L%z
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: prometheus-pvc
  namespace: vm00
spec:
  storageClassName: gp3
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 10Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: grafana-pvc
  namespace: vm00
spec:
  storageClassName: gp3
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 5Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: opensearch-pvc
  namespace: vm00
spec:
  storageClassName: gp3
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 20Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: otel-collector
  namespace: vm00
spec:
  replicas: 1
  selector:
    matchLabels:
      app: otel-collector
  template:
    metadata:
      labels:
        app: otel-collector
    spec:
      serviceAccountName: otel-collector
      containers:
        - name: otel-collector
          image: otel/opentelemetry-collector-contrib:0.122.1
          args:
            - --config=/etc/otelcol-contrib/config.yaml
          ports:
            - containerPort: 4317
            - containerPort: 4318
            - containerPort: 9464
          volumeMounts:
            - name: config
              mountPath: /etc/otelcol-contrib
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              memory: 512Mi
      volumes:
        - name: config
          configMap:
            name: otel-collector-config
---
apiVersion: v1
kind: Service
metadata:
  name: otel-collector
  namespace: vm00
spec:
  selector:
    app: otel-collector
  ports:
    - name: otlp-grpc
      port: 4317
      targetPort: 4317
    - name: otlp-http
      port: 4318
      targetPort: 4318
    - name: metrics
      port: 9464
      targetPort: 9464
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: vm00
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
    spec:
      containers:
        - name: prometheus
          image: prom/prometheus:v3.1.0
          args:
            - --config.file=/etc/prometheus/prometheus.yml
            - --storage.tsdb.path=/prometheus
            - --storage.tsdb.retention.time=7d
            - --storage.tsdb.retention.size=8GB
          ports:
            - containerPort: 9090
          volumeMounts:
            - name: config
              mountPath: /etc/prometheus
            - name: data
              mountPath: /prometheus
      volumes:
        - name: config
          configMap:
            name: prometheus-config
        - name: data
          persistentVolumeClaim:
            claimName: prometheus-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: vm00
spec:
  selector:
    app: prometheus
  ports:
    - port: 9090
      targetPort: 9090
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: vm00
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      containers:
        - name: grafana
          image: grafana/grafana:11.5.2
          env:
            - name: GF_SECURITY_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: monitoring-secrets
                  key: GRAFANA_ADMIN_PASSWORD
            - name: GF_INSTALL_PLUGINS
              value: grafana-opensearch-datasource
          ports:
            - containerPort: 3000
          volumeMounts:
            - name: datasources
              mountPath: /etc/grafana/provisioning/datasources
            - name: data
              mountPath: /var/lib/grafana
      volumes:
        - name: datasources
          configMap:
            name: grafana-datasources
        - name: data
          persistentVolumeClaim:
            claimName: grafana-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: vm00
spec:
  selector:
    app: grafana
  ports:
    - port: 3000
      targetPort: 3000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: jaeger
  namespace: vm00
spec:
  replicas: 1
  selector:
    matchLabels:
      app: jaeger
  template:
    metadata:
      labels:
        app: jaeger
    spec:
      containers:
        - name: jaeger
          image: jaegertracing/all-in-one:1.64.0
          env:
            - name: COLLECTOR_OTLP_ENABLED
              value: "true"
          ports:
            - containerPort: 16686
            - containerPort: 4317
---
apiVersion: v1
kind: Service
metadata:
  name: jaeger
  namespace: vm00
spec:
  selector:
    app: jaeger
  ports:
    - name: ui
      port: 16686
      targetPort: 16686
    - name: otlp-grpc
      port: 4317
      targetPort: 4317
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres-exporter
  namespace: vm00
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres-exporter
  template:
    metadata:
      labels:
        app: postgres-exporter
    spec:
      containers:
        - name: postgres-exporter
          image: prometheuscommunity/postgres-exporter:v0.17.1
          env:
            - name: DATA_SOURCE_NAME
              value: postgresql://postgres:postgres@postgres.vm00.svc.cluster.local:5432/tasks?sslmode=disable
          ports:
            - containerPort: 9187
---
apiVersion: v1
kind: Service
metadata:
  name: postgres-exporter
  namespace: vm00
spec:
  selector:
    app: postgres-exporter
  ports:
    - port: 9187
      targetPort: 9187
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis-exporter
  namespace: vm00
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis-exporter
  template:
    metadata:
      labels:
        app: redis-exporter
    spec:
      containers:
        - name: redis-exporter
          image: oliver006/redis_exporter:v1.67.0
          env:
            - name: REDIS_ADDR
              value: redis://redis.vm00.svc.cluster.local:6379
          ports:
            - containerPort: 9121
---
apiVersion: v1
kind: Service
metadata:
  name: redis-exporter
  namespace: vm00
spec:
  selector:
    app: redis-exporter
  ports:
    - port: 9121
      targetPort: 9121
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: opensearch
  namespace: vm00
spec:
  replicas: 1
  selector:
    matchLabels:
      app: opensearch
  template:
    metadata:
      labels:
        app: opensearch
    spec:
      containers:
        - name: opensearch
          image: opensearchproject/opensearch:2.18.0
          env:
            - name: discovery.type
              value: single-node
            - name: bootstrap.memory_lock
              value: "true"
            - name: OPENSEARCH_JAVA_OPTS
              value: -Xms512m -Xmx512m
            - name: OPENSEARCH_INITIAL_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: monitoring-secrets
                  key: OPENSEARCH_INITIAL_ADMIN_PASSWORD
          ports:
            - containerPort: 9200
          volumeMounts:
            - name: data
              mountPath: /usr/share/opensearch/data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: opensearch-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: opensearch
  namespace: vm00
spec:
  selector:
    app: opensearch
  ports:
    - port: 9200
      targetPort: 9200
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: opensearch-dashboards
  namespace: vm00
spec:
  replicas: 1
  selector:
    matchLabels:
      app: opensearch-dashboards
  template:
    metadata:
      labels:
        app: opensearch-dashboards
    spec:
      containers:
        - name: opensearch-dashboards
          image: opensearchproject/opensearch-dashboards:2.18.0
          env:
            - name: OPENSEARCH_HOSTS
              value: '["https://opensearch.vm00.svc.cluster.local:9200"]'
            - name: OPENSEARCH_USERNAME
              value: admin
            - name: OPENSEARCH_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: monitoring-secrets
                  key: OPENSEARCH_INITIAL_ADMIN_PASSWORD
            - name: OPENSEARCH_SSL_VERIFICATIONMODE
              value: none
          ports:
            - containerPort: 5601
---
apiVersion: v1
kind: Service
metadata:
  name: opensearch-dashboards
  namespace: vm00
spec:
  selector:
    app: opensearch-dashboards
  ports:
    - port: 5601
      targetPort: 5601
---
apiVersion: batch/v1
kind: Job
metadata:
  name: init-opensearch-dashboards
  namespace: vm00
spec:
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: init-opensearch
          image: curlimages/curl:8.12.1
          command:
            - /bin/sh
            - -c
            - |
              set -eu
              until curl -ks -u admin:${OPENSEARCH_INITIAL_ADMIN_PASSWORD} https://opensearch.vm00.svc.cluster.local:9200 >/dev/null; do sleep 5; done
              until curl -s -u admin:${OPENSEARCH_INITIAL_ADMIN_PASSWORD} http://opensearch-dashboards.vm00.svc.cluster.local:5601/app/home >/dev/null; do sleep 5; done
              cat >/tmp/index-pattern.json <<'EOF'
              {
                "attributes": {
                  "title": "demoboard-logs*",
                  "timeFieldName": "@timestamp"
                }
              }
              EOF
              curl -s -u admin:${OPENSEARCH_INITIAL_ADMIN_PASSWORD} -H "osd-xsrf: true" -H "Content-Type: application/json" \
                -d @/tmp/index-pattern.json \
                http://opensearch-dashboards.vm00.svc.cluster.local:5601/api/saved_objects/index-pattern/demoboard-logs
          env:
            - name: OPENSEARCH_INITIAL_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: monitoring-secrets
                  key: OPENSEARCH_INITIAL_ADMIN_PASSWORD
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: fluent-bit
  namespace: vm00
spec:
  selector:
    matchLabels:
      app: fluent-bit
  template:
    metadata:
      labels:
        app: fluent-bit
    spec:
      serviceAccountName: fluent-bit
      containers:
        - name: fluent-bit
          image: fluent/fluent-bit:3.2.5
          args:
            - /fluent-bit/bin/fluent-bit
            - -c
            - /fluent-bit/etc/fluent-bit.conf
          volumeMounts:
            - name: config
              mountPath: /fluent-bit/etc
            - name: varlog
              mountPath: /var/log
              readOnly: true
          securityContext:
            runAsUser: 0
      volumes:
        - name: config
          configMap:
            name: fluent-bit-config
        - name: varlog
          hostPath:
            path: /var/log
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: grafana
  namespace: vm00
  annotations:
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - grafana-vm00.eks00.tpcsonline.org
      secretName: tls-certificate
  rules:
    - host: grafana-vm00.eks00.tpcsonline.org
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: grafana
                port:
                  number: 3000
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: prometheus
  namespace: vm00
  annotations:
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - prometheus-vm00.eks00.tpcsonline.org
      secretName: tls-certificate
  rules:
    - host: prometheus-vm00.eks00.tpcsonline.org
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: prometheus
                port:
                  number: 9090
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: jaeger
  namespace: vm00
  annotations:
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - jaeger-vm00.eks00.tpcsonline.org
      secretName: tls-certificate
  rules:
    - host: jaeger-vm00.eks00.tpcsonline.org
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: jaeger
                port:
                  number: 16686
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: opensearch-dashboards
  namespace: vm00
  annotations:
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - opensearch-vm00.eks00.tpcsonline.org
      secretName: tls-certificate
  rules:
    - host: opensearch-vm00.eks00.tpcsonline.org
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: opensearch-dashboards
                port:
                  number: 5601
