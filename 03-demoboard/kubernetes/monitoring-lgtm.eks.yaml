---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: lgtm-pvc
  namespace: vm00
spec:
  storageClassName: gp2
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 20Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: lgtm
  namespace: vm00
spec:
  replicas: 1
  selector:
    matchLabels:
      app: lgtm
  template:
    metadata:
      labels:
        app: lgtm
    spec:
      containers:
        - name: lgtm
          image: grafana/otel-lgtm:latest
          ports:
            - containerPort: 3000
            - containerPort: 3100
            - containerPort: 3200
            - containerPort: 4040
            - containerPort: 4317
            - containerPort: 4318
            - containerPort: 9090
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: lgtm-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: otel-collector
  namespace: vm00
spec:
  selector:
    app: lgtm
  ports:
    - name: otlp-grpc
      port: 4317
      targetPort: 4317
    - name: otlp-http
      port: 4318
      targetPort: 4318
---
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: vm00
spec:
  selector:
    app: lgtm
  ports:
    - name: http
      port: 3000
      targetPort: 3000
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: vm00
spec:
  selector:
    app: lgtm
  ports:
    - name: http
      port: 9090
      targetPort: 9090
---
apiVersion: v1
kind: Service
metadata:
  name: lgtm
  namespace: vm00
spec:
  selector:
    app: lgtm
  ports:
    - name: loki
      port: 3100
      targetPort: 3100
    - name: tempo
      port: 3200
      targetPort: 3200
    - name: pyroscope
      port: 4040
      targetPort: 4040
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: promtail
  namespace: vm00
spec:
  selector:
    matchLabels:
      app: promtail
  template:
    metadata:
      labels:
        app: promtail
    spec:
      serviceAccountName: promtail
      containers:
        - name: promtail
          image: grafana/promtail:3.6.1
          args:
            - -config.file=/etc/promtail/config.yml
          volumeMounts:
            - name: config
              mountPath: /etc/promtail
            - name: positions
              mountPath: /run/promtail
            - name: varlog
              mountPath: /var/log
              readOnly: true
          securityContext:
            runAsUser: 0
      volumes:
        - name: config
          configMap:
            name: promtail-config
        - name: positions
          emptyDir: {}
        - name: varlog
          hostPath:
            path: /var/log
---
apiVersion: batch/v1
kind: Job
metadata:
  name: grafana-bootstrap
  namespace: vm00
spec:
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: grafana-bootstrap
          image: python:3.12-alpine
          command:
            - python3
            - /bootstrap/import_grafana_dashboard.py
          volumeMounts:
            - name: script
              mountPath: /bootstrap
            - name: dashboard
              mountPath: /dashboards
      volumes:
        - name: script
          configMap:
            name: grafana-bootstrap
        - name: dashboard
          configMap:
            name: demoboard-lgtm-dashboard
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: grafana
  namespace: vm00
  annotations:
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - grafana-vm00.eks00.tpcsonline.org
      secretName: tls-certificate
  rules:
    - host: grafana-vm00.eks00.tpcsonline.org
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: grafana
                port:
                  number: 3000
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: prometheus
  namespace: vm00
  annotations:
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - prometheus-vm00.eks00.tpcsonline.org
      secretName: tls-certificate
  rules:
    - host: prometheus-vm00.eks00.tpcsonline.org
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: prometheus
                port:
                  number: 9090
