---
apiVersion: v1
kind: Namespace
metadata:
  name: vm00
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: promtail
  namespace: vm00
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: vm00-promtail-metadata-reader
rules:
  - apiGroups: [""]
    resources: ["pods", "namespaces", "nodes"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: vm00-promtail-metadata-reader
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: vm00-promtail-metadata-reader
subjects:
  - kind: ServiceAccount
    name: promtail
    namespace: vm00
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: promtail-config
  namespace: vm00
data:
  config.yml: |
    server:
      http_listen_port: 9080
      grpc_listen_port: 0

    positions:
      filename: /run/promtail/positions.yaml

    clients:
      - url: http://lgtm.vm00.svc.cluster.local:3100/loki/api/v1/push

    scrape_configs:
      - job_name: kubernetes-demoboard
        kubernetes_sd_configs:
          - role: pod

        relabel_configs:
          - source_labels: [__meta_kubernetes_namespace]
            action: keep
            regex: vm00
          - source_labels: [__meta_kubernetes_pod_label_app]
            action: keep
            regex: demoboard-.*
          - source_labels: [__meta_kubernetes_pod_label_app]
            target_label: job
          - source_labels: [__meta_kubernetes_pod_label_app]
            target_label: service_name
          - source_labels: [__meta_kubernetes_namespace]
            target_label: namespace
          - source_labels: [__meta_kubernetes_pod_name]
            target_label: pod
          - source_labels: [__meta_kubernetes_pod_uid]
            target_label: pod_uid
          - source_labels: [__meta_kubernetes_pod_node_name]
            target_label: node_name
          - source_labels: [__meta_kubernetes_pod_container_name]
            target_label: container
          - source_labels: [__meta_kubernetes_pod_uid, __meta_kubernetes_pod_container_name]
            separator: /
            target_label: __path__
            replacement: /var/log/pods/*$1/*.log

        pipeline_stages:
          - cri: {}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-bootstrap
  namespace: vm00
data:
  import_grafana_dashboard.py: |
    import json
    import time
    import urllib.request

    GRAFANA_URL = "http://grafana.vm00.svc.cluster.local:3000"
    AUTH_HEADER = "Basic YWRtaW46YWRtaW4="

    def wait_for_grafana():
        request = urllib.request.Request(
            f"{GRAFANA_URL}/api/health",
            headers={"Authorization": AUTH_HEADER},
        )
        deadline = time.time() + 180
        while time.time() < deadline:
            try:
                with urllib.request.urlopen(request, timeout=5) as response:
                    if response.status == 200:
                        return
            except Exception:
                pass
            time.sleep(3)
        raise RuntimeError("Grafana did not become ready in time")

    def import_dashboard():
        with open("/dashboards/demoboard-lgtm-overview.json", "r", encoding="utf-8") as handle:
            dashboard = json.load(handle)
        payload = json.dumps({
            "dashboard": dashboard,
            "folderId": 0,
            "overwrite": True,
        }).encode()
        request = urllib.request.Request(
            f"{GRAFANA_URL}/api/dashboards/db",
            data=payload,
            headers={
                "Authorization": AUTH_HEADER,
                "Content-Type": "application/json",
            },
            method="POST",
        )
        with urllib.request.urlopen(request, timeout=15) as response:
            result = json.loads(response.read().decode())
        print(result["status"], result["uid"])

    wait_for_grafana()
    import_dashboard()
---
