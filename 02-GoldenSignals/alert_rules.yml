groups:
  - name: http-alerts
    rules:
      - alert: HighErrorRate
        expr: |
          100 * sum(rate(http_requests_total{status="500"}[1m]))
              /
          sum(rate(http_requests_total[1m])) > 1
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: "Taux d'erreur HTTP élevé (>1%)"
          description: "Le taux de requêtes HTTP 500 dépasse 1% sur la dernière minute."
